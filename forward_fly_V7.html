        default: baseColor1 = '#66bb6a'; baseColor2 = '#388e3c';
      }
      const baseGrad = ctx.createLinearGradient(x, y, x + w, y);
      baseGrad.addColorStop(0, baseColor1);
      baseGrad.addColorStop(0.5, baseColor2);
      baseGrad.addColorStop(1, baseColor1);
      ctx.fillStyle = baseGrad;
      ctx.fillRect(x, y, w, h);

      ctx.strokeStyle = 'rgba(255, 255, 255, 0.15)';
      ctx.lineWidth = 1;
      ctx.beginPath();
      ctx.roundRect(x + 1, y + 1, w - 2, h - 2, 3);
      ctx.stroke();
      ctx.restore();

      switch(currentSceneMode) {
        case SCENES.DESERT:
          drawDesertObstacle(x, y, w, h, isTop, typeId, fixedSeed);
          break;
        case SCENES.NIGHT:
          drawNightObstacle(x, y, w, h, isTop, typeId, fixedSeed);
          break;
        case SCENES.DUNGEON:
          drawDungeonObstacle(x, y, w, h, isTop, typeId, fixedSeed);
          break;
        default:
          drawClassicObstacle(x, y, w, h, isTop, typeId, fixedSeed);
      }
    }


    /**
     * drawDesertObstacle() — 沙漠障碍物类型分发器
     *
     * 0=仙人掌(cactus)  1=枯木桩(stump)  2=仙人球(cactus ball)
     * 3=石像(statue)    4=岩石(rock)
     *
     * @param {number} x, y, w, h, isTop, typeId, fixedSeed — 见 drawScenePillar
     * 返回：无
     */
    function drawDesertObstacle(x, y, w, h, isTop, typeId, fixedSeed) {
      switch(typeId) {
        case 0: drawDesertCactus(x, y, w, h, isTop, fixedSeed); break;
        case 1: drawDesertStump(x, y, w, h, isTop, fixedSeed); break;
        case 2: drawDesertCactusBall(x, y, w, h, isTop, fixedSeed); break;
        case 3: drawDesertStatue(x, y, w, h, isTop, fixedSeed); break;
        case 4: drawDesertRock(x, y, w, h, isTop, fixedSeed); break;
        default: drawDesertCactus(x, y, w, h, isTop, fixedSeed);
      }
    }


    /**
     * drawNightObstacle() — 黑夜障碍物类型分发器
     *
     * 0=大树(tree)  1=树藤+蜘蛛(vine with spider)
     * 2=大石头(boulder)  3=枯树桩(stump)  4=墓碑(gravestone)
     *
     * 完成场景绘制后额外添加月光轮廓发光（半透明蓝白描边 + 填充），
     * 使障碍物在黑暗背景中更清晰可见。
     *
     * @param {number} x, y, w, h, isTop, typeId, fixedSeed — 见 drawScenePillar
     * 返回：无
     */
    function drawNightObstacle(x, y, w, h, isTop, typeId, fixedSeed) {
      // 先绘制障碍物本体
      switch(typeId) {
        case 0: drawNightTree(x, y, w, h, isTop, fixedSeed); break;
        case 1: drawNightVineWithSpider(x, y, w, h, isTop, fixedSeed); break;
        case 2: drawNightBoulder(x, y, w, h, isTop, fixedSeed); break;
        case 3: drawNightStump(x, y, w, h, isTop, fixedSeed); break;
        case 4: drawNightGravestone(x, y, w, h, isTop, fixedSeed); break;
        default: drawNightTree(x, y, w, h, isTop, fixedSeed);
      }
      // 添加月光轮廓发光效果，使障碍物在黑夜中更清晰
      ctx.strokeStyle = 'rgba(150, 200, 255, 0.35)';
      ctx.lineWidth = 2;
      ctx.beginPath();
      ctx.roundRect(x - 1, y - 1, w + 2, h + 2, 4);
      ctx.stroke();
      // 月光高光效果
      ctx.fillStyle = 'rgba(150, 200, 255, 0.06)';
      ctx.beginPath();
      ctx.roundRect(x, y, w, h, 3);
      ctx.fill();
    }


    /**
     * drawDungeonObstacle() — 地下城障碍物类型分发器
     *
     * 0=砖块(brick)  1=铁栅栏(bars)  2=矿镐(pickaxe)
     * 3=带铁钉木棍(spiked log)  4=石柱(pillar)
     *
     * @param {number} x, y, w, h, isTop, typeId, fixedSeed — 见 drawScenePillar
     * 返回：无
     */
    function drawDungeonObstacle(x, y, w, h, isTop, typeId, fixedSeed) {
      switch(typeId) {
        case 0: drawDungeonBrick(x, y, w, h, isTop, fixedSeed); break;
        case 1: drawDungeonBars(x, y, w, h, isTop, fixedSeed); break;
        case 2: drawDungeonPickaxe(x, y, w, h, isTop, fixedSeed); break;
        case 3: drawDungeonSpikedLog(x, y, w, h, isTop, fixedSeed); break;
        case 4: drawDungeonPillar(x, y, w, h, isTop, fixedSeed); break;
        default: drawDungeonBrick(x, y, w, h, isTop, fixedSeed);
      }
    }

    /**
     * drawClassicObstacle() — 绘制经典障碍物
     */

    /* ================================================================
     *  障碍物绘制函数 — 三大场景各5种类型，二次元化写实风格
     * ================================================================ */

    // ---- 沙漠场景障碍物 ----

    /**
     * drawDesertCactus() — 沙漠仙人掌
     */
    function drawDesertCactus(x, y, w, h, isTop, fixedSeed) {
      const baseSeed = fixedSeed || 0;
      const cx = x + w / 2;

      const segmentCount = Math.max(1, Math.floor(h / 70));
      const segmentHeight = h / segmentCount;
      
      for (let seg = 0; seg < segmentCount; seg++) {
        const segY = isTop ? y + seg * segmentHeight : y + h - (seg + 1) * segmentHeight;
        const segWidth = w * (0.8 + (seg % 2) * 0.15);
        const segX = cx - segWidth / 2;
        
        // 主体渐变（更真实的仙人掌颜色）
        const bodyGrad = ctx.createLinearGradient(segX, segY, segX + segWidth, segY);
        bodyGrad.addColorStop(0, '#2d5a27');
        bodyGrad.addColorStop(0.2, '#3d7c35');
        bodyGrad.addColorStop(0.5, '#4a9c42');
        bodyGrad.addColorStop(0.8, '#3d7c35');
        bodyGrad.addColorStop(1, '#2d5a27');
        ctx.fillStyle = bodyGrad;
        
        // 分段主体形状
        ctx.beginPath();
        ctx.roundRect(segX + 4, segY + 2, segWidth - 8, segmentHeight - 4, 6);
        ctx.fill();
        
        // 分段高光
        ctx.fillStyle = 'rgba(255, 255, 255, 0.08)';
        ctx.beginPath();
        ctx.roundRect(segX + 8, segY + 6, 8, segmentHeight - 12, 3);
        ctx.fill();
        
        // 分段纹理线
        ctx.strokeStyle = 'rgba(0, 0, 0, 0.1)';
        ctx.lineWidth = 1;
        ctx.beginPath();
        ctx.moveTo(segX + segWidth * 0.3, segY + 5);
        ctx.lineTo(segX + segWidth * 0.3, segY + segmentHeight - 5);
        ctx.stroke();
        ctx.beginPath();
        ctx.moveTo(segX + segWidth * 0.7, segY + 5);
        ctx.lineTo(segX + segWidth * 0.7, segY + segmentHeight - 5);
        ctx.stroke();
      }
      
      // 侧臂（更精美的分支）
      if (h > 100) {
        const armCount = seededRandom(baseSeed + 50) > 0.7 ? 2 : 1;
        
        for (let armIdx = 0; armIdx < armCount; armIdx++) {
          const armSeg = 1 + armIdx;
          const armY = isTop ? y + armSeg * segmentHeight + segmentHeight / 2 : 
                               y + h - (armSeg + 1) * segmentHeight + segmentHeight / 2;
          const armDir = armIdx === 0 ? -1 : 1;
          const armLength = 30 + seededRandom(baseSeed + 100 + armIdx) * 20;
          const armWidth = w * 0.5;
          
          // 侧臂主体
          const armGrad = ctx.createLinearGradient(cx, armY, cx + armDir * armLength, armY);
          armGrad.addColorStop(0, '#3d7c35');
          armGrad.addColorStop(0.5, '#4a9c42');
          armGrad.addColorStop(1, '#3d7c35');
          ctx.fillStyle = armGrad;
          
          ctx.beginPath();
          ctx.moveTo(cx + (armDir === -1 ? -w/2 + 8 : w/2 - 8), armY - armWidth/2);
          ctx.lineTo(cx + armDir * armLength, armY - armWidth/2);
          ctx.lineTo(cx + armDir * armLength, armY + armWidth/2);
          ctx.lineTo(cx + (armDir === -1 ? -w/2 + 8 : w/2 - 8), armY + armWidth/2);
          ctx.closePath();
          ctx.fill();
          
          // 侧臂高光
          ctx.fillStyle = 'rgba(255, 255, 255, 0.08)';
          ctx.beginPath();
          ctx.moveTo(cx + (armDir === -1 ? -w/2 + 12 : w/2 - 12), armY - armWidth/2 + 4);
          ctx.lineTo(cx + armDir * armLength - armDir * 4, armY - armWidth/2 + 4);
          ctx.lineTo(cx + armDir * armLength - armDir * 4, armY - armWidth/2 + 10);
          ctx.lineTo(cx + (armDir === -1 ? -w/2 + 12 : w/2 - 12), armY - armWidth/2 + 10);
          ctx.closePath();
          ctx.fill();
        }
      }
      
      // 刺（更密集更真实）
      const spineColor = '#1a3d16';
      for (let i = 10; i < h - 10; i += 8) {
        const cy = isTop ? y + h - i : y + i;
        const spineOffset = (i % 16) * 0.5;
        
        // 左侧刺组
        ctx.strokeStyle = spineColor;
        ctx.lineWidth = 1;
        ctx.beginPath(); ctx.moveTo(x + 6, cy); ctx.lineTo(x - 3, cy - 4 + spineOffset); ctx.stroke();
        ctx.beginPath(); ctx.moveTo(x + 6, cy); ctx.lineTo(x - 3, cy + 2 + spineOffset); ctx.stroke();
        
        // 右侧刺组
        ctx.beginPath(); ctx.moveTo(x + w - 6, cy); ctx.lineTo(x + w + 3, cy - 4 + spineOffset); ctx.stroke();
        ctx.beginPath(); ctx.moveTo(x + w - 6, cy); ctx.lineTo(x + w + 3, cy + 2 + spineOffset); ctx.stroke();
        
        // 中间刺（朝向内侧）
        ctx.beginPath(); ctx.moveTo(cx - 8, cy); ctx.lineTo(cx - 14, cy - 3); ctx.stroke();
        ctx.beginPath(); ctx.moveTo(cx + 8, cy); ctx.lineTo(cx + 14, cy - 3); ctx.stroke();
      }
      
      // 顶部装饰（花朵或尖刺）
      if (h > 60) {
        const topY = isTop ? y + 8 : y + h - 8;
        
        if (seededRandom(baseSeed + 200) > 0.3) {
          // 精美花朵
          const petalColors = ['#ffb74d', '#ff9800', '#f57c00', '#ef6c00'];
          
          // 花瓣层
          for (let layer = 0; layer < 2; layer++) {
            const petalCount = 8;
            const radius = 5 + layer * 3;
            for (let i = 0; i < petalCount; i++) {
              const angle = (i / petalCount) * Math.PI * 2 + layer * 0.2;
              const px = cx + Math.cos(angle) * radius;
              const py = topY + Math.sin(angle) * radius * 0.5;
              
              ctx.fillStyle = petalColors[layer % petalColors.length];
              ctx.beginPath();
              ctx.ellipse(px, py, 3, 5, angle, 0, Math.PI * 2);
              ctx.fill();
            }
          }
          
          // 花蕊
          ctx.fillStyle = '#fff176';
          ctx.beginPath(); ctx.arc(cx, topY, 3, 0, Math.PI * 2); ctx.fill();
          
          // 花蕊高光
          ctx.fillStyle = '#fffde7';
          ctx.beginPath(); ctx.arc(cx - 1, topY - 1, 1.5, 0, Math.PI * 2); ctx.fill();
        } else {
          // 顶部尖刺
          ctx.fillStyle = '#3d7c35';
          for (let i = 0; i < 3; i++) {
            const angle = (i - 1) * 0.4;
            ctx.beginPath();
            ctx.moveTo(cx + (i - 1) * 4, topY);
            ctx.lineTo(cx + (i - 1) * 6 - Math.sin(angle) * 4, topY - 8 - Math.cos(angle) * 4);
            ctx.lineTo(cx + (i - 1) * 4 + Math.sin(angle) * 2, topY);
            ctx.closePath();
            ctx.fill();
          }
        }
      }
      
      // 添加阴影边缘
      ctx.strokeStyle = 'rgba(0, 0, 0, 0.15)';
      ctx.lineWidth = 1;
      ctx.beginPath();
      ctx.roundRect(x + 2, y + 2, w - 4, h - 4, 4);
      ctx.stroke();
    }

    /**
     * drawDesertStump() — 沙漠枯木桩
     */
    function drawDesertStump(x, y, w, h, isTop, fixedSeed) {
      const baseSeed = fixedSeed || 0;
      // 主体
      const grad = ctx.createLinearGradient(x, y, x + w, y);
      grad.addColorStop(0, '#8d6e63');
      grad.addColorStop(0.5, '#a1887f');
      grad.addColorStop(1, '#6d4c41');
      ctx.fillStyle = grad;
      ctx.beginPath();
      ctx.roundRect(x + 4, y, w - 8, h, 4);
      ctx.fill();
      // 年轮（端面）
      const ringY = isTop ? y + h - 6 : y + 6;
      ctx.strokeStyle = '#5d4037';
      ctx.lineWidth = 1;
      ctx.beginPath(); ctx.arc(x + w/2, ringY, 8, 0, Math.PI * 2); ctx.stroke();
      ctx.beginPath(); ctx.arc(x + w/2, ringY, 4, 0, Math.PI * 2); ctx.stroke();
      // 裂纹
      ctx.strokeStyle = 'rgba(0,0,0,0.2)';
      ctx.lineWidth = 1;
      ctx.beginPath();
      ctx.moveTo(x + w/2, y + (isTop ? h * 0.3 : 0));
      ctx.lineTo(x + w/2 + 5, y + (isTop ? h * 0.6 : h * 0.4));
      ctx.stroke();
    }

    /**
     * drawDesertCactusBall() — 沙漠仙人球（圆形）
     */
    function drawDesertCactusBall(x, y, w, h, isTop, fixedSeed) {
      const baseSeed = fixedSeed || 0;
      // 球体（椭圆）
      const grad = ctx.createRadialGradient(x + w/2, y + h/2, 2, x + w/2, y + h/2, Math.max(w, h) * 0.5);
      grad.addColorStop(0, '#66bb6a');
      grad.addColorStop(0.7, '#4caf50');
      grad.addColorStop(1, '#2e7d32');
      ctx.fillStyle = grad;
      ctx.beginPath();
      ctx.ellipse(x + w/2, y + h/2, w/2 - 2, h/2 - 2, 0, 0, Math.PI * 2);
      ctx.fill();
      // 棱线
      ctx.strokeStyle = 'rgba(27,94,32,0.3)';
      ctx.lineWidth = 1;
      for (let i = 0; i < 6; i++) {
        const a = (i / 6) * Math.PI;
        ctx.beginPath();
        ctx.ellipse(x + w/2, y + h/2, w/2 - 2, h/2 - 2, a, 0, Math.PI);
        ctx.stroke();
      }
      // 小花
      ctx.fillStyle = '#ff80ab';
      ctx.beginPath(); ctx.arc(x + w/2, y + (isTop ? 6 : h - 6), 4, 0, Math.PI * 2); ctx.fill();
      ctx.fillStyle = '#fff9c4';
      ctx.beginPath(); ctx.arc(x + w/2, y + (isTop ? 6 : h - 6), 2, 0, Math.PI * 2); ctx.fill();
    }

    /**
     * drawDesertStatue() — 沙漠石像（人形轮廓）
     */
    function drawDesertStatue(x, y, w, h, isTop, fixedSeed) {
      const baseSeed = fixedSeed || 0;
      const cx = x + w/2;
      // 身体
      ctx.fillStyle = '#bcaaa4';
      ctx.beginPath();
      ctx.roundRect(x + 8, y, w - 16, h, 4);
      ctx.fill();
      // 头部
      ctx.fillStyle = '#a1887f';
      const headY = isTop ? y + h - 16 : y + 10;
      ctx.beginPath();
      ctx.ellipse(cx, headY, 10, 8, 0, 0, Math.PI * 2);
      ctx.fill();
      // 面部
      ctx.fillStyle = '#5d4037';
      ctx.beginPath(); ctx.arc(cx - 3, headY - 1, 1.5, 0, Math.PI * 2); ctx.fill();
      ctx.beginPath(); ctx.arc(cx + 3, headY - 1, 1.5, 0, Math.PI * 2); ctx.fill();
      // 风化纹理
      ctx.fillStyle = 'rgba(0,0,0,0.08)';
      for (let i = 0; i < Math.floor(h / 25); i++) {
        ctx.beginPath();
        ctx.arc(x + 10 + seededRandom(baseSeed + i * 5) * (w - 20), y + 10 + i * 25, 2 + seededRandom(baseSeed + i * 5 + 1) * 2, 0, Math.PI * 2);
        ctx.fill();
      }
    }

    /**
     * drawDesertRock() — 沙漠岩石
     */
    function drawDesertRock(x, y, w, h, isTop, fixedSeed) {
      const baseSeed = fixedSeed || 0;
      // 主体
      const grad = ctx.createLinearGradient(x, y, x + w, y + h);
      grad.addColorStop(0, '#b0bec5');
      grad.addColorStop(0.5, '#90a4ae');
      grad.addColorStop(1, '#78909c');
      ctx.fillStyle = grad;
      ctx.beginPath();
      ctx.roundRect(x + 3, y, w - 6, h, 8);
      ctx.fill();
      // 高光
      ctx.fillStyle = 'rgba(255,255,255,0.2)';
      ctx.beginPath();
      ctx.roundRect(x + 6, y + 3, w * 0.3, h * 0.4, 4);
      ctx.fill();
      // 裂纹
      ctx.strokeStyle = 'rgba(0,0,0,0.15)';
      ctx.lineWidth = 1;
      ctx.beginPath();
      ctx.moveTo(x + w/2, y + (isTop ? h * 0.2 : 0));
      ctx.lineTo(x + w/2 - 5, y + (isTop ? h * 0.5 : h * 0.4));
      ctx.lineTo(x + w/2 + 3, y + (isTop ? h * 0.8 : h * 0.7));
      ctx.stroke();
    }

    // ---- 黑夜场景障碍物 ----

    /**
     * drawNightTree() — 黑夜大树（精美写实风格）
     */
    function drawNightTree(x, y, w, h, isTop, fixedSeed) {
      const baseSeed = fixedSeed || 0;
      const cx = x + w / 2;

      const trunkGrad = ctx.createLinearGradient(x, y, x + w, y);
      trunkGrad.addColorStop(0, '#2d1f17');
      trunkGrad.addColorStop(0.5, '#3d2d20');
      trunkGrad.addColorStop(1, '#2d1f17');
      ctx.fillStyle = trunkGrad;

      ctx.beginPath();
      const baseWidth = w;
      const topWidth = w * 0.8;
      const baseX = cx - baseWidth / 2;
      const topX = cx - topWidth / 2;

      ctx.moveTo(baseX, y + h);
      ctx.lineTo(topX, y);
      ctx.lineTo(topX + topWidth, y);
      ctx.lineTo(baseX + baseWidth, y + h);
      ctx.closePath();
      ctx.fill();

      ctx.fillStyle = 'rgba(255, 255, 255, 0.04)';
      ctx.beginPath();
      ctx.moveTo(baseX + 8, y + h);
      ctx.lineTo(topX + 8, y);
      ctx.lineTo(topX + 12, y);
      ctx.lineTo(baseX + 12, y + h);
      ctx.closePath();
      ctx.fill();

      // 树冠
      if (h > 40) {
        const crownY = isTop ? y + 5 : y + h - 5;
        const crownSize = w * 0.7;
        ctx.fillStyle = '#154d15';
        ctx.beginPath();
        ctx.arc(cx - 6, crownY, crownSize * 0.45, 0, Math.PI * 2);
        ctx.fill();
        ctx.fillStyle = '#1a5a1a';
        ctx.beginPath();
        ctx.arc(cx + 4, crownY - 2, crownSize * 0.5, 0, Math.PI * 2);
        ctx.fill();
        ctx.fillStyle = 'rgba(100, 180, 100, 0.2)';
        ctx.beginPath();
        ctx.arc(cx - 3, crownY - 3, crownSize * 0.3, 0, Math.PI * 2);
        ctx.fill();
      }
    }

    /**
     * drawNightVineWithSpider() — 黑夜树藤+垂落蜘蛛（精美写实风格）
     */
    function drawNightVineWithSpider(x, y, w, h, isTop, fixedSeed) {
      const baseSeed = fixedSeed || 0;

      // 主藤
      ctx.strokeStyle = '#2e5a1c';
      ctx.lineWidth = 6;
      ctx.lineCap = 'round';
      ctx.beginPath();
      const startY = isTop ? y : y + h;
      ctx.moveTo(x + w/2, startY);
      const step = 15;
      const totalSteps = Math.min(Math.floor(h / step), 20);
      for (let i = 0; i < totalSteps; i++) {
        const py = isTop ? y + (i + 1) * step : y + h - (i + 1) * step;
        const ox = Math.sin(i * 0.6) * 6;
        ctx.lineTo(x + w/2 + ox, py);
      }
      ctx.stroke();

      // 叶片
      const leafCount = Math.min(Math.floor(h / 35), 6);
      for (let i = 0; i < leafCount; i++) {
        const leafY = isTop ? y + 20 + i * 30 : y + h - 20 - i * 30;
        const leafX = x + w/2 + (i % 2 === 0 ? 10 : -10);
        ctx.fillStyle = '#4caf50';
        ctx.beginPath();
        ctx.ellipse(leafX, leafY, 6, 3, 0, 0, Math.PI * 2);
        ctx.fill();
      }

      // 蜘蛛（仅上方障碍物）
      if (isTop && h > 80) {
        const spiderCount = Math.min(2, Math.floor(h / 80));
        for (let i = 0; i < spiderCount; i++) {
          const spiderY = y + 40 + i * 60;
          const spiderX = x + w/2 + Math.sin(i * 1.2) * 4;

          ctx.strokeStyle = 'rgba(200, 200, 200, 0.4)';
          ctx.lineWidth = 0.5;
          ctx.beginPath();
          ctx.moveTo(spiderX, y);
          ctx.lineTo(spiderX, spiderY);
          ctx.stroke();

          ctx.fillStyle = '#1a1a1a';
          ctx.beginPath();
          ctx.ellipse(spiderX, spiderY, 4, 5, 0, 0, Math.PI * 2);
          ctx.fill();

          ctx.strokeStyle = '#1a1a1a';
          ctx.lineWidth = 1;
          for (let leg = 0; leg < 4; leg++) {
            const legAngle = (leg / 4) * Math.PI - Math.PI / 2;
            const legLength = 5 + leg;
            ctx.beginPath();
            ctx.moveTo(spiderX - 2, spiderY);
            ctx.lineTo(spiderX - 2 - Math.cos(legAngle) * legLength, spiderY + Math.sin(legAngle) * legLength);
            ctx.stroke();
            ctx.beginPath();
            ctx.moveTo(spiderX + 2, spiderY);
            ctx.lineTo(spiderX + 2 + Math.cos(legAngle) * legLength, spiderY + Math.sin(legAngle) * legLength);
            ctx.stroke();
          }
        }
      }
    }

    /**
     * drawNightBoulder() — 黑夜大石头
     */
    function drawNightBoulder(x, y, w, h, isTop, fixedSeed) {
      const baseSeed = fixedSeed || 0;
      // 主体
      const grad = ctx.createRadialGradient(x + w/2, y + h/2, 2, x + w/2, y + h/2, Math.max(w, h) * 0.5);
      grad.addColorStop(0, '#78909c');
      grad.addColorStop(0.6, '#546e7a');
      grad.addColorStop(1, '#37474f');
      ctx.fillStyle = grad;
      ctx.beginPath();
      ctx.ellipse(x + w/2, y + h/2, w/2 - 2, h/2 - 2, 0, 0, Math.PI * 2);
      ctx.fill();
      // 高光
      ctx.fillStyle = 'rgba(255,255,255,0.15)';
      ctx.beginPath();
      ctx.ellipse(x + w/2 - 5, y + h/3, 6, 4, -0.3, 0, Math.PI * 2);
      ctx.fill();
      // 苔藓
      ctx.fillStyle = 'rgba(76,175,80,0.25)';
      for (let i = 0; i < 3; i++) {
        ctx.beginPath();
        ctx.arc(x + 8 + seededRandom(baseSeed + i * 7) * (w - 16), y + seededRandom(baseSeed + i * 7 + 1) * h, 3, 0, Math.PI * 2);
        ctx.fill();
      }
    }

    /**
     * drawNightStump() — 黑夜枯树桩
     */
    function drawNightStump(x, y, w, h, isTop, fixedSeed) {
      const baseSeed = fixedSeed || 0;
      // 主体
      ctx.fillStyle = '#4e342e';
      ctx.beginPath();
      ctx.roundRect(x + 6, y, w - 12, h, 3);
      ctx.fill();
      // 截面
      const cutY = isTop ? y + h - 8 : y + 8;
      ctx.fillStyle = '#3e2723';
      ctx.beginPath();
      ctx.ellipse(x + w/2, cutY, w/2 - 8, 6, 0, 0, Math.PI * 2);
      ctx.fill();
      // 年轮
      ctx.strokeStyle = 'rgba(255,255,255,0.15)';
      ctx.lineWidth = 0.5;
      ctx.beginPath(); ctx.ellipse(x + w/2, cutY, 8, 3, 0, 0, Math.PI * 2); ctx.stroke();
      ctx.beginPath(); ctx.ellipse(x + w/2, cutY, 4, 1.5, 0, 0, Math.PI * 2); ctx.stroke();
      // 裂纹
      ctx.strokeStyle = 'rgba(0,0,0,0.3)';
      ctx.lineWidth = 1;
      ctx.beginPath();
      ctx.moveTo(x + w/2, y + (isTop ? 0 : h));
      ctx.lineTo(x + w/2 + 4, y + h * 0.5);
      ctx.stroke();
    }

    /**
     * drawNightGravestone() — 黑夜墓碑
     */
    function drawNightGravestone(x, y, w, h, isTop, fixedSeed) {
      const baseSeed = fixedSeed || 0;
      const cx = x + w/2;
      // 主体
      ctx.fillStyle = '#455a64';
      ctx.beginPath();
      ctx.roundRect(x + 6, y, w - 12, h - 8, 3);
      ctx.fill();
      // 圆顶
      const topY = isTop ? y + h - 8 : y + 8;
      ctx.beginPath();
      ctx.arc(cx, topY, w/2 - 8, isTop ? Math.PI : 0, isTop ? 0 : Math.PI);
      ctx.fill();
      // 十字
      ctx.strokeStyle = 'rgba(200,200,200,0.4)';
      ctx.lineWidth = 2;
      const crossY = isTop ? y + h * 0.4 : y + h * 0.3;
      ctx.beginPath();
      ctx.moveTo(cx, crossY - 8);
      ctx.lineTo(cx, crossY + 8);
      ctx.moveTo(cx - 5, crossY - 2);
      ctx.lineTo(cx + 5, crossY - 2);
      ctx.stroke();
      // 文字
      ctx.font = '8px monospace';
      ctx.fillStyle = 'rgba(200,200,200,0.3)';
      ctx.textAlign = 'center';
      ctx.fillText('R.I.P', cx, crossY + 18);
    }

    // ---- 地下城场景障碍物 ----

    /**
     * drawDungeonBrick() — 地下城砖块（石砖砌墙）
     */
    function drawDungeonBrick(x, y, w, h, isTop, fixedSeed) {
      const baseSeed = fixedSeed || 0;
      // 主体
      ctx.fillStyle = '#455a64';
      ctx.beginPath();
      ctx.roundRect(x + 2, y, w - 4, h, 2);
      ctx.fill();
      // 砖缝
      ctx.strokeStyle = 'rgba(0,0,0,0.3)';
      ctx.lineWidth = 1;
      const brickH = 14;
      for (let row = 0; row < Math.floor(h / brickH); row++) {
        const by = y + row * brickH;
        // 横缝
        ctx.beginPath(); ctx.moveTo(x + 2, by); ctx.lineTo(x + w - 2, by); ctx.stroke();
        // 竖缝（交错）
        const offset = (row % 2) * (w / 2);
        ctx.beginPath(); ctx.moveTo(x + offset + w/4, by); ctx.lineTo(x + offset + w/4, by + brickH); ctx.stroke();
      }
      // 边框高光
      ctx.strokeStyle = 'rgba(255,255,255,0.1)';
      ctx.lineWidth = 1;
      ctx.beginPath();
      ctx.roundRect(x + 2, y, w - 4, h, 2);
      ctx.stroke();
    }

    /**
     * drawDungeonBars() — 地下城铁栅栏
     */
    function drawDungeonBars(x, y, w, h, isTop, fixedSeed) {
      const baseSeed = fixedSeed || 0;
      // 横杆
      ctx.fillStyle = '#546e7a';
      const barCount = 4;
      const spacing = w / (barCount + 1);
      for (let i = 1; i <= barCount; i++) {
        const bx = x + i * spacing - 2;
        // 竖杆
        const barGrad = ctx.createLinearGradient(bx, y, bx + 4, y);
        barGrad.addColorStop(0, '#78909c');
        barGrad.addColorStop(0.5, '#b0bec5');
        barGrad.addColorStop(1, '#607d8b');
        ctx.fillStyle = barGrad;
        ctx.beginPath();
        ctx.roundRect(bx, y, 4, h, 2);
        ctx.fill();
      }
      // 横梁
      const railGrad = ctx.createLinearGradient(x, y, x, y + 4);
      railGrad.addColorStop(0, '#90a4ae');
      railGrad.addColorStop(1, '#546e7a');
      ctx.fillStyle = railGrad;
      ctx.beginPath(); ctx.roundRect(x, y + (isTop ? h - 10 : 4), w, 4, 2); ctx.fill();
      ctx.beginPath(); ctx.roundRect(x, y + (isTop ? 4 : h - 10), w, 4, 2); ctx.fill();
      // 锈斑
      ctx.fillStyle = 'rgba(183,28,28,0.2)';
      for (let i = 0; i < 3; i++) {
        ctx.beginPath();
        ctx.arc(x + 8 + seededRandom(baseSeed + i * 5) * (w - 16), y + seededRandom(baseSeed + i * 5 + 1) * h, 2, 0, Math.PI * 2);
        ctx.fill();
      }
    }

    /**
     * drawDungeonPickaxe() — 地下城矿镐
     */
    function drawDungeonPickaxe(x, y, w, h, isTop, fixedSeed) {
      const baseSeed = fixedSeed || 0;
      const cx = x + w/2;
      // 柄
      ctx.fillStyle = '#6d4c41';
      ctx.beginPath();
      ctx.roundRect(cx - 3, y, 6, h, 2);
      ctx.fill();
      // 镐头
      const headY = isTop ? y + h - 10 : y + 10;
      ctx.fillStyle = '#78909c';
      ctx.beginPath();
      ctx.moveTo(cx - 16, headY + 3);
      ctx.lineTo(cx - 6, headY - 3);
      ctx.lineTo(cx - 4, headY);
      ctx.lineTo(cx + 4, headY);
      ctx.lineTo(cx + 6, headY - 3);
      ctx.lineTo(cx + 16, headY + 3);
      ctx.lineTo(cx + 6, headY + 6);
      ctx.lineTo(cx + 4, headY + 3);
      ctx.lineTo(cx - 4, headY + 3);
      ctx.lineTo(cx - 6, headY + 6);
      ctx.closePath();
      ctx.fill();
      // 金属高光
      ctx.fillStyle = 'rgba(255,255,255,0.2)';
      ctx.beginPath();
      ctx.ellipse(cx - 10, headY, 4, 2, -0.3, 0, Math.PI * 2);
      ctx.fill();
    }

    /**
     * drawDungeonSpikedLog() — 地下城带铁钉木棍
     */
    function drawDungeonSpikedLog(x, y, w, h, isTop, fixedSeed) {
      const baseSeed = fixedSeed || 0;
      const cx = x + w/2;
      // 木棍主体
      const logGrad = ctx.createLinearGradient(x, y, x + w, y);
      logGrad.addColorStop(0, '#795548');
      logGrad.addColorStop(0.5, '#8d6e63');
      logGrad.addColorStop(1, '#6d4c41');
      ctx.fillStyle = logGrad;
      ctx.beginPath();
      ctx.roundRect(x + 6, y, w - 12, h, 4);
      ctx.fill();
      // 木纹
      ctx.strokeStyle = 'rgba(0,0,0,0.15)';
      ctx.lineWidth = 1;
      for (let i = 10; i < h - 10; i += 16) {
        const cy = isTop ? y + h - i : y + i;
        ctx.beginPath(); ctx.moveTo(x + 8, cy); ctx.lineTo(x + w - 8, cy); ctx.stroke();
      }
      // 铁钉
      ctx.fillStyle = '#90a4ae';
      for (let i = 8; i < h - 8; i += 20) {
        const ny = isTop ? y + h - i : y + i;
        // 左侧钉
        ctx.beginPath();
        ctx.moveTo(x + 6, ny - 3);
        ctx.lineTo(x - 2, ny);
        ctx.lineTo(x + 6, ny + 3);
        ctx.closePath();
        ctx.fill();
        // 右侧钉
        ctx.beginPath();
        ctx.moveTo(x + w - 6, ny - 3);
        ctx.lineTo(x + w + 2, ny);
        ctx.lineTo(x + w - 6, ny + 3);
        ctx.closePath();
        ctx.fill();
      }
    }

    /**
     * drawDungeonPillar() — 地下城石柱
     */
    function drawDungeonPillar(x, y, w, h, isTop, fixedSeed) {
      const baseSeed = fixedSeed || 0;
      // 主体
      const grad = ctx.createLinearGradient(x, y, x + w, y);
      grad.addColorStop(0, '#546e7a');
      grad.addColorStop(0.3, '#78909c');
      grad.addColorStop(0.7, '#607d8b');
      grad.addColorStop(1, '#455a64');
      ctx.fillStyle = grad;
      ctx.beginPath();
      ctx.roundRect(x + 8, y + 4, w - 16, h - 8, 4);
      ctx.fill();
      // 柱头
      ctx.fillStyle = '#455a64';
      ctx.beginPath();
      ctx.roundRect(x + 4, y + (isTop ? 0 : h - 10), w - 8, 10, 3);
      ctx.fill();
      // 柱座
      ctx.fillStyle = '#37474f';
      ctx.beginPath();
      ctx.roundRect(x + 2, y + (isTop ? h - 6 : 0), w - 4, 6, 2);
      ctx.fill();
      // 裂缝
      ctx.strokeStyle = 'rgba(0,0,0,0.2)';
      ctx.lineWidth = 1;
      ctx.beginPath();
      ctx.moveTo(x + w/2, y + (isTop ? h * 0.3 : 0));
      ctx.lineTo(x + w/2 - 4, y + (isTop ? h * 0.6 : h * 0.4));
      ctx.lineTo(x + w/2 + 3, y + (isTop ? h * 0.8 : h * 0.7));
      ctx.stroke();
    }

    // ---- 经典场景障碍物（保留5种）----


    /**
     * drawClassicObstacle() — 经典障碍物类型分发器
     *
     * 0=竹子(bamboo)  1=藤蔓石头(vine rock)  2=仙人掌(cactus)
     * 3=铁棍(iron bar)  4=原木(wooden log)
     *
     * @param {number} x, y, w, h, isTop, typeId, fixedSeed — 见 drawScenePillar
     * 返回：无
     */
    function drawClassicObstacle(x, y, w, h, isTop, typeId, fixedSeed) {
      switch(typeId) {
        case 0: drawBamboo(x, y, w, h, isTop, fixedSeed); break;
        case 1: drawVineRock(x, y, w, h, isTop, fixedSeed); break;
        case 2: drawCactus(x, y, w, h, isTop, fixedSeed); break;
        case 3: drawIronBar(x, y, w, h, isTop, fixedSeed); break;
        case 4: drawWoodenLog(x, y, w, h, isTop, fixedSeed); break;
        default: drawBamboo(x, y, w, h, isTop, fixedSeed);
      }
    }

    /**
     * drawBamboo() — 绘制竹子障碍物
     */
    function drawBamboo(x, y, w, h, isTop, fixedSeed) {
      const baseSeed = fixedSeed || 0;
      const bambooGrad = ctx.createLinearGradient(x, y, x + w, y);
      bambooGrad.addColorStop(0, '#2e7d32');
      bambooGrad.addColorStop(0.5, '#4caf50');
      bambooGrad.addColorStop(1, '#1b5e20');
      ctx.fillStyle = bambooGrad;
      ctx.beginPath();
      ctx.roundRect(x + 8, y, w - 16, h, 4);
      ctx.fill();
      // 竹节
      ctx.fillStyle = '#1b5e20';
      for (let i = 20; i < h - 10; i += 30) {
        const ny = isTop ? y + h - i : y + i;
        ctx.beginPath();
        ctx.roundRect(x + 6, ny - 3, w - 12, 6, 2);
        ctx.fill();
      }
      // 高光
      ctx.fillStyle = 'rgba(255,255,255,0.15)';
      ctx.beginPath();
      ctx.roundRect(x + 12, y + 3, 4, h - 6, 2);
      ctx.fill();
    }

    /**
     * drawVineRock() — 绘制被绿藤缠绕的石头障碍物
     */
    function drawVineRock(x, y, w, h, isTop, fixedSeed) {
      const baseSeed = fixedSeed || 0;
      // 石头主体
      const grad = ctx.createLinearGradient(x, y, x + w, y + h);
      grad.addColorStop(0, '#78909c');
      grad.addColorStop(0.5, '#607d8b');
      grad.addColorStop(1, '#455a64');
      ctx.fillStyle = grad;
      ctx.beginPath();
      ctx.roundRect(x + 3, y, w - 6, h, 8);
      ctx.fill();
      // 藤蔓
      ctx.strokeStyle = '#4caf50';
      ctx.lineWidth = 3;
      ctx.lineCap = 'round';
      ctx.beginPath();
      const vineStart = isTop ? y : y + h;
      ctx.moveTo(x + 5, vineStart);
      for (let i = 0; i < h / 15; i++) {
        const vy = isTop ? y + i * 15 : y + h - i * 15;
        ctx.lineTo(x + 5 + Math.sin(i * 1.2) * 10, vy);
      }
      ctx.stroke();
      // 小叶片
      ctx.fillStyle = '#66bb6a';
      for (let i = 0; i < Math.floor(h / 25); i++) {
        const ly = isTop ? y + 15 + i * 25 : y + h - 15 - i * 25;
        ctx.beginPath();
        ctx.ellipse(x + 8 + seededRandom(baseSeed + i) * (w - 16), ly, 4, 2, 0, 0, Math.PI * 2);
        ctx.fill();
      }
    }

    /**
     * drawCactus() — 绘制经典仙人掌障碍物
     */
    function drawCactus(x, y, w, h, isTop, fixedSeed) {
      const baseSeed = fixedSeed || 0;
      const bodyColor = '#2e7d32';
      const darkColor = '#1b5e20';
      ctx.fillStyle = bodyColor;
      ctx.beginPath();
      ctx.roundRect(x + 8, y, w - 16, h, 5);
      ctx.fill();
      // 刺
      ctx.strokeStyle = darkColor;
      ctx.lineWidth = 1;
      for (let i = 12; i < h - 12; i += 14) {
        const cy = isTop ? y + h - i : y + i;
        ctx.beginPath(); ctx.moveTo(x + 8, cy); ctx.lineTo(x + 2, cy - 3); ctx.stroke();
        ctx.beginPath(); ctx.moveTo(x + w - 8, cy); ctx.lineTo(x + w - 2, cy - 3); ctx.stroke();
      }
    }

    /**
     * drawIronBar() — 绘制铁棍障碍物
     */
    function drawIronBar(x, y, w, h, isTop, fixedSeed) {
      const baseSeed = fixedSeed || 0;
      const barGrad = ctx.createLinearGradient(x, y, x + w, y);
      barGrad.addColorStop(0, '#78909c');
      barGrad.addColorStop(0.3, '#b0bec5');
      barGrad.addColorStop(0.7, '#90a4ae');
      barGrad.addColorStop(1, '#546e7a');
      ctx.fillStyle = barGrad;
      ctx.beginPath();
      ctx.roundRect(x + 12, y, w - 24, h, 3);
      ctx.fill();
      // 高光
      ctx.fillStyle = 'rgba(255,255,255,0.2)';
      ctx.beginPath();
      ctx.roundRect(x + 14, y + 2, 4, h - 4, 2);
      ctx.fill();
      // 锈迹
      ctx.fillStyle = 'rgba(183,28,28,0.15)';
      for (let i = 0; i < 3; i++) {
        ctx.beginPath();
        ctx.arc(x + 14 + seededRandom(baseSeed + i * 3) * (w - 28), y + seededRandom(baseSeed + i * 3 + 1) * h, 3, 0, Math.PI * 2);
        ctx.fill();
      }
    }

    /**
     * drawWoodenLog() — 绘制原木障碍物
     */
    function drawWoodenLog(x, y, w, h, isTop, fixedSeed) {
      const baseSeed = fixedSeed || 0;
      const logGrad = ctx.createLinearGradient(x, y, x + w, y);
      logGrad.addColorStop(0, '#6d4c41');
      logGrad.addColorStop(0.5, '#8d6e63');
      logGrad.addColorStop(1, '#5d4037');
      ctx.fillStyle = logGrad;
      ctx.beginPath();
      ctx.roundRect(x + 4, y, w - 8, h, 5);
      ctx.fill();
      // 木纹
      ctx.strokeStyle = 'rgba(0,0,0,0.15)';
      ctx.lineWidth = 1;
      for (let i = 12; i < h - 10; i += 18) {
        const cy = isTop ? y + h - i : y + i;
        ctx.beginPath(); ctx.moveTo(x + 6, cy); ctx.lineTo(x + w - 6, cy + 2); ctx.stroke();
      }
      // 树皮
      ctx.fillStyle = '#4e342e';
      ctx.beginPath();
      ctx.roundRect(x + 4, y, w - 8, 5, 2);
      ctx.fill();
    }



    /**
     * drawHUD() — 绘制游戏 HUD 信息（计时/速度/安全提示/静音按钮）
     *
     * 显示内容（按绘制顺序）：
     * 1. 计时器：居上半透明黑底圆角矩形(120x40) + 粗体 mm:ss
     * 2. 制作者信息：左上角 制作者：云洲
     * 3. 速度显示：右上角 速度：xx.x
     * 4. 安全保护提示（safeTimer > 0 时）：鸟上方闪烁 安全 文字
     *    透明度 = safeTimer / SAFE_FRAMES
     * 5. 静音按钮：右下角半透明底 + 图标文字（emoji + 状态 + (M) 快捷键提示）
     *    点击区域增大至 120x22，方便移动端触控
     *
     * 参数：无
     * 返回：无
     */
    function drawHUD() {
      const secs = Math.floor(frameCount / 60);
      const m = String(Math.floor(secs / 60)).padStart(2, '0');
      const s = String(secs % 60).padStart(2, '0');

      // 计时器背景
      ctx.fillStyle = 'rgba(0, 0, 0, 0.4)';
      ctx.fillRect(W / 2 - 60, 10, 120, 40);
      ctx.strokeStyle = 'rgba(255, 255, 255, 0.3)';
      ctx.lineWidth = 2;
      ctx.strokeRect(W / 2 - 60, 10, 120, 40);

      // 计时器文字
      ctx.font = 'bold 28px monospace';
      ctx.textAlign = 'center';
      ctx.textBaseline = 'top';
      ctx.fillStyle = '#fff';
      ctx.fillText(m + ':' + s, W / 2, 18);

      // 制作者信息
      ctx.font = '12px monospace';
      ctx.textAlign = 'left';
      ctx.fillStyle = 'rgba(255, 255, 255, 0.7)';
      ctx.fillText('制作者：云洲', 10, 16);

      // 速度显示
      ctx.textAlign = 'right';
      ctx.fillStyle = 'rgba(255, 255, 255, 0.9)';
      ctx.fillText('速度：' + gameSpeed.toFixed(1), W - 10, 16);

      // 安全保护提示
      if (safeTimer > 0) {
        const alpha = safeTimer / SAFE_FRAMES;
        ctx.font = 'bold 14px monospace';
        ctx.textAlign = 'center';
        ctx.fillStyle = `rgba(255, 255, 170, ${alpha})`;
        ctx.fillText('✨ 安全 ✨', BIRD_X + 14, bird.y - 15);
      }

      // 静音按钮（增大点击区域，方便移动端触控）
      const muteBtnW = 120;
      const muteBtnH = 22;
      const muteBtnX = W - muteBtnW - 5;
      const muteBtnY = H - muteBtnH - 3;
      ctx.fillStyle = 'rgba(0, 0, 0, 0.3)';
      ctx.beginPath();
      ctx.roundRect(muteBtnX, muteBtnY, muteBtnW, muteBtnH, 6);
      ctx.fill();
      ctx.font = '12px monospace';
      ctx.textAlign = 'center';
      ctx.fillStyle = isMuted ? '#ff6666' : '#66ff66';
      ctx.fillText(isMuted ? '🔇 静音 (M)' : '🔊 声音 (M)', muteBtnX + muteBtnW / 2, muteBtnY + muteBtnH / 2 + 4);
    }

    /**
     * drawStartScreen() — 画精美的开始界面
     * 使用 START_LAYOUT 全局坐标，与点击事件同步
     */
    // 开始界面全局布局常量（绘制与点击共用）
    const START_LAYOUT = {
      titleY: 50,
      subtitleY: 82,
      authorY: 108,
      sceneLabelY: 138,
      sceneBtnY: 170,
      sceneSpacing: 135,
      sceneX: 300,
      diffLabelY: 138,
      diffBtnY: 170,
      diffSpacing: 115,
      diffX: 700,
      skinLabelY: 235,
      skinBtnY: 267,
      skinSpacing: 92,
      btnY: 350,
      btnW: 220,
      btnH: 56
    };


    /**
     * drawStartScreen() — 绘制精美的游戏开始界面
     *
     * 所有 UI 坐标使用 START_LAYOUT 全局常量，与 handleUIClick 的点击检测共用，
     * 确保点击区域与视觉元素精确对齐。
     *
     * 绘制层次（由远到近）：
     * 1. 径向半透明遮罩（中心透明边缘暗化）
     * 2. 标题金色光晕（3 圈同心圆 + 径向渐变底）
     * 3. 标题文字 肥啾向前飞（金色，shadowBlur=30 发光）
     * 4. 副标题 + 作者署名
     * 5. 场景选择：3 个单选按钮（沙漠/黑夜/地下城）
     * 6. 难度选择：3 个单选按钮（简单/中等/困难）
     * 7. 角色皮肤选择：5 个单选按钮（经典/萌黄/蓝色/粉色/绿色）
     * 8. 开始游戏按钮：悬停时缩放 1.06x + 增强光晕 + 阴影
     * 9. 底部操作提示 + 版本信息
     * 10. 教程提示（低难度下显示，alpha 从 1 渐变至 0，300 帧后完全消失）
     *
     * 参数：无
     * 返回：无
     */
    function drawStartScreen() {
      const overlayGrad = ctx.createRadialGradient(W/2, H/2, 50, W/2, H/2, 550);
      overlayGrad.addColorStop(0, 'rgba(0, 0, 0, 0.1)');
      overlayGrad.addColorStop(0.5, 'rgba(0, 0, 0, 0.35)');
      overlayGrad.addColorStop(1, 'rgba(0, 0, 0, 0.7)');
      ctx.fillStyle = overlayGrad;
      ctx.fillRect(0, 0, W, H);

      ctx.textAlign = 'center';
      ctx.textBaseline = 'middle';
      const L = START_LAYOUT;

      for (let i = 3; i > 0; i--) {
        ctx.beginPath();
        ctx.arc(W / 2, L.titleY, 60 + i * 25, 0, Math.PI * 2);
        ctx.strokeStyle = `rgba(252, 219, 90, ${0.05 + i * 0.02})`;
        ctx.lineWidth = 2;
        ctx.stroke();
      }

      const titleGlow = ctx.createRadialGradient(W/2, L.titleY, 20, W/2, L.titleY, 120);
      titleGlow.addColorStop(0, 'rgba(252, 219, 90, 0.15)');
      titleGlow.addColorStop(0.5, 'rgba(252, 219, 90, 0.05)');
      titleGlow.addColorStop(1, 'rgba(252, 219, 90, 0)');
      ctx.fillStyle = titleGlow;
      ctx.beginPath();
      ctx.roundRect(W/2 - 180, L.titleY - 36, 360, 68, 18);
      ctx.fill();

      ctx.shadowColor = '#fcdb5a';
      ctx.shadowBlur = 30;
      ctx.font = 'bold 48px monospace';
      ctx.fillStyle = '#fcdb5a';
      ctx.fillText('肥啾向前飞', W / 2, L.titleY);
      ctx.shadowBlur = 0;

      ctx.font = '15px monospace';
      ctx.fillStyle = 'rgba(255, 235, 59, 0.7)';
      ctx.fillText('Flappy Fat Bird', W / 2, L.subtitleY);

      ctx.font = '13px monospace';
      ctx.fillStyle = 'rgba(255, 255, 255, 0.4)';
      ctx.fillText('制作者：云洲', W / 2, L.authorY);

      const sceneLabels = ['🌵 沙漠', '🌙 黑夜', '🏰 地下城'];
      const sceneKeys = [SCENES.DESERT, SCENES.NIGHT, SCENES.DUNGEON];
      const diffLabels = ['🌸 简单', '⚡ 中等', '🔥 困难'];
      const diffKeys = [DIFFICULTY_LEVELS.LOW, DIFFICULTY_LEVELS.MEDIUM, DIFFICULTY_LEVELS.HIGH];

      ctx.font = 'bold 16px monospace';
      ctx.fillStyle = 'rgba(255, 255, 255, 0.9)';
      ctx.fillText('选择场景', L.sceneX, L.sceneLabelY);
      ctx.fillText('选择难度', L.diffX, L.diffLabelY);

      for (let i = 0; i < 3; i++) {
        const rx = L.sceneX + (i - 1) * L.sceneSpacing;
        const ry = L.sceneBtnY;

    /**
     * drawRadioBtn() — 绘制单选按钮（外圈+内圈+标签文字）
     *
     * @param {number} x — 圆心 X 坐标
     * @param {number} y — 圆心 Y 坐标
     * @param {boolean} isSelected — 是否选中
     * @param {string} label — 下方标签文字
     * 返回：无
     */
    function drawRadioBtn(x, y, isSelected, label) {
      // 外圈
      ctx.beginPath();
      ctx.arc(x, y, RADIO_BTN.radius, 0, Math.PI * 2);
      ctx.fillStyle = isSelected ? '#ffca28' : 'rgba(255, 255, 255, 0.15)';
      ctx.fill();
      ctx.strokeStyle = isSelected ? '#ffd54f' : 'rgba(255, 255, 255, 0.4)';
      ctx.lineWidth = 2;
      ctx.stroke();
      
      // 内圈
      if (isSelected) {
        ctx.beginPath();
        ctx.arc(x, y, 6, 0, Math.PI * 2);
        ctx.fillStyle = '#fff';
        ctx.fill();
      }
      
      // 标签
      ctx.font = isSelected ? 'bold 14px monospace' : '14px monospace';
      ctx.fillStyle = isSelected ? '#ffca28' : 'rgba(255, 255, 255, 0.7)';
      ctx.fillText(label, x, y + 28);

    /**
     * drawHoverIndicator() — 绘制肥啾悬停状态指示器
     *
     * 在鸟上方显示带发光效果的 ... 省略号符号，
     * 仅当 hoverTimer 在 (0, HOVER_FRAMES) 区间内时显示。
     *
     * 参数：无
     * 返回：无
     */
    function drawHoverIndicator() {
      if (bird.hoverTimer > 0 && bird.hoverTimer < HOVER_FRAMES) {
        const bx = bird.x + 14;
        const by = Math.round(bird.y);

    /* ================================================================
     *  六、游戏逻辑函数 — 控制障碍物生成、肥啾物理、碰撞检测等
     * ================================================================ */


    /**
     * spawnObstacle() — 在屏幕右侧生成一组新障碍物（非对称布局 + 随机通道位置）
     *
     * 核心算法：
     * 1. 计算可用垂直空间 = maxBottom - minTop - gapSize
     * 2. 随机决定 obsType：
     *    - 70%：上下均有 (both)
     *    - 15%/20%（20秒后）：仅上 (top)
     *    - 15%/20%：仅下 (bottom)
     * 3. 通道位置随机分布，20秒前波动 gapRandomOffset*0.8，
     *    20秒后增加因子 linearRamp 至 gapRandomOffset+30
     * 4. 边界约束：上柱最小 30px，下柱底部离地至少 30px，单侧最小 80px
     * 5. 生成场景类型和固定种子
     *
     * 参数：无（读取 frameCount, gapSize, obstacles）
     * 返回：无（push 到 obstacles 数组）
     */
    function spawnObstacle() {
      const minTop = 30;                      // 上柱子最少要 30px 高
      const maxBottom = GROUND_Y - 30;        // 下柱子底部要留出 30px
      const available = maxBottom - minTop - gapSize; // 可以自由调整的范围
      if (available < 30) return;             // 范围太小就不生成了
      
      // 决定障碍物类型（非对称布局）
      const singleSideProb = frameCount < DIFFICULTY_START ? 0.15 : 0.2; // 20秒后单侧概率提升
      const rand = Math.random();
      let obsType;
      if (rand < 0.7) {
        obsType = 'both';      // 70%：上下都有
      } else if (rand < 0.7 + singleSideProb) {
        obsType = 'top';       // 15%/20%：仅上有
      } else {
        obsType = 'bottom';    // 15%/20%：仅下有
      }
      
      // 通道位置在整个可用范围内随机分布，忽高忽低
      let gapCenter;
      const centerY = (minTop + maxBottom) / 2;
      
      // 根据难度调整随机落差
      const difficultyOffset = difficultyConfig.gapRandomOffset;
      
      if (frameCount < DIFFICULTY_START) {
        gapCenter = centerY + (Math.random() - 0.5) * difficultyOffset * 0.8;
      } else {
        const difficultyFactor = Math.min(1, (frameCount - DIFFICULTY_START) / 3600);
        gapCenter = centerY + (Math.random() - 0.5) * (difficultyOffset + difficultyFactor * 30);
      }
      
      // 确保通道不会超出边界
      gapCenter = Math.max(minTop + gapSize / 2, Math.min(maxBottom - gapSize / 2, gapCenter));
      
      let topH, bottomTop;
      
      if (obsType === 'both') {
        // 上下都有
        topH = Math.floor(gapCenter - gapSize / 2);
        bottomTop = Math.ceil(gapCenter + gapSize / 2);
      } else if (obsType === 'top') {
        // 仅上有：从顶部延伸至随机Y坐标，确保下方有足够空间
        const minTopHeight = 80; // 最小高度保证挑战
        const maxTopHeight = GROUND_Y - gapSize - minTop;
        topH = minTopHeight + Math.floor(Math.random() * (maxTopHeight - minTopHeight));
        bottomTop = GROUND_Y; // 下障碍物不存在
      } else {
        // 仅下有：从地面向上延伸至随机Y坐标
        const minBottomHeight = 80;
        const maxBottomTop = maxBottom - minBottomHeight;
        bottomTop = minTop + Math.floor(Math.random() * (maxBottomTop - minTop));
        topH = 0; // 上障碍物不存在
      }
      
      // 随机选择场景特定的障碍物类型
      const sceneType = getSceneObstacleType(W);
      // 生成固定的种子，用于绘制时的随机细节（确保细节不随位置移动而变化）
      const obstacleSeed = W * 10000 + obstacles.length * 1000 + Math.floor(Math.random() * 1000);
      
      obstacles.push({ 
        x: W, 
        topH: topH, 
        bottomTop: bottomTop, 
        type: sceneType,
        sceneType: sceneType,
        obsType: obsType,
        seed: obstacleSeed  // 固定种子，确保绘制细节稳定
      });
    }


    /**
     * updateBird() — 更新肥啾物理状态（核心手感逻辑：重力/上升/悬停/碰撞）
     *
     * 物理状态机：
     * 1. 按住空格（spaceHeld=true）：每帧施加 HOLD_LIFT 上升力，阻止悬停
     * 2. 松开空格：
     *    a. 到达最高点或正在下落（vy >= 0）且悬停未满 HOVER_FRAMES 帧：
     *       - vy = 0，鸟定在空中，hoverTimer++
     *       - 悬停首帧播放 playHoverSound()
     *    b. 否则：施加 GRAVITY 重力加速下落
     * 3. 速度钳位：[MAX_UP(-12), MAX_FALL(15)]
     * 4. 地面碰撞（先计算 nextY = bird.y + bird.vy）：
     *    - 若会穿地：卡在地面位置，触发 gameOver（安全期内不触发）
     *    - 否则正常更新位置
     * 5. 天花板碰撞：反弹且速度减半
     * 6. 翅膀动画：每 8 帧切换 wingFrame（0=上位，1=下位）
     *
     * 悬停机制是手感的精髓：每次跳跃到最高点后短暂悬停 0.5 秒，
     * 给玩家缓冲时间调整节奏，使操作更友好。
     *
     * 参数：无（操作全局 bird 对象）
     * 返回：无
     */
    function updateBird() {
      // ---- 按住空格：持续上升，不触发悬停 ----
      if (spaceHeld) {
        bird.vy += HOLD_LIFT();            // 每帧加一点向上速度
        bird.hoverTimer = HOVER_FRAMES;  // 把悬停计时器设满，阻止悬停
      }
      // ---- 松开空格：受重力下落，到最高点时悬停 ----
      else {
        // 如果速度 >= 0（开始下落或刚好到顶）且还没悬停够
        if (bird.vy >= 0 && bird.hoverTimer < HOVER_FRAMES) {
          bird.vy = 0;                   // 速度归零，定在空中
          bird.hoverTimer++;             // 悬停计时 +1
          // 在悬停开始时播放音效
          if (bird.hoverTimer === 1) {
            playHoverSound();
          }
        } else {
          bird.vy += GRAVITY();            // 正常受重力加速下落
        }
      }

      // ---- 限制最大上升/下落速度，防止飞太快穿模 ----
      bird.vy = Math.max(MAX_UP, Math.min(MAX_FALL, bird.vy));
      
      // ---- 更新位置前先检查地面碰撞，防止穿过地面 ----
      const nextY = bird.y + bird.vy;
      if (nextY + bird.h > GROUND_Y) {
        bird.y = GROUND_Y - bird.h;      // 卡在地面位置，不能穿过
        bird.vy = 0;                     // 速度归零
        if (safeTimer <= 0) {
          gameOver();                    // 直接死亡
          return;
        }
      } else {
        bird.y = nextY;                   // 正常更新位置
      }

      // ---- 碰到天花板，弹回来 ----
      if (bird.y <= 0) {
        bird.y = 1;
        bird.vy = Math.abs(bird.vy) * 0.5; // 碰到天花板反弹，速度减半
      }

      // ---- 翅膀扇动动画（每 8 帧切换一次） ----
      bird.wingTimer++;
      if (bird.wingTimer >= 8) {
        bird.wingTimer = 0;
        bird.wingFrame = 1 - bird.wingFrame;  // 在 0 和 1 之间切换
      }
    }


    /**
     * updateObstacles() — 控制障碍物生成计时与向左滚动
     *
     * 1. spawnTimer 累加，达到 spawnInterval 时调用 spawnObstacle()
     * 2. 遍历 obstacles（从后向前避免索引偏移），每个障碍物 x 减去 gameSpeed，
     *    若完全移出左侧屏幕（x + OBS_W < 0）则从数组中移除
     *
     * 参数：无
     * 返回：无
     */
    function updateObstacles() {
      // ---- 计时器到了就生成一组新障碍物 ----
      spawnTimer++;
      if (spawnTimer >= spawnInterval) {
        spawnTimer = 0;
        spawnObstacle();
      }

      // ---- 所有已有障碍物向左移动，超出屏幕的删除掉 ----
      for (let i = obstacles.length - 1; i >= 0; i--) {
        obstacles[i].x -= gameSpeed;
        if (obstacles[i].x + OBS_W < 0) {  // 完全移出左侧屏幕
          obstacles.splice(i, 1);           // 从数组中删除
        }
      }
    }


    /**
     * updateSpeed() — 随游戏进程推进逐步增加难度
     *
     * 难度曲线分两阶段：
     *
     * 阶段一：前 20 秒（休闲期，frameCount < DIFFICULTY_START = 1200）
     * - 速度线性增长：INITIAL_SPEED + frameCount * SPEED_INC，上限 MAX_SPEED
     * - 间隙：INITIAL_GAP +/- gapVariation/2，不低于 MIN_GAP_BEFORE_20S
     * - 间隔：INITIAL_INTERVAL +/- 30，不低于 MIN_INTERVAL_BEFORE_20S
     *
     * 阶段二：20 秒后（困难递增期）
     * - difficulty = min(1, elapsed/5400)，90 秒内从 0 线性增长到 1
     * - 间隙线性缩小：从 INITIAL_GAP 过渡到 MIN_GAP_AFTER_20S
     * - 间隔线性缩短：从 INITIAL_INTERVAL 过渡到 MIN_INTERVAL_AFTER_20S
     * - 随机波动幅度随 difficulty 增加而减小（难度更稳定）
     *
     * 若当前屏幕障碍物数量不足（< currentMinObsCount），
     * 强制将生成间隔降至 <=50（20秒前）或 <=40（20秒后）。
     *
     * 参数：无（修改 gameSpeed, gapSize, spawnInterval）
     * 返回：无
     */
    function updateSpeed() {
      // ---- 速度逐步提升 ----
      gameSpeed = Math.min(MAX_SPEED(), INITIAL_SPEED() + frameCount * SPEED_INC());
      
      // ---- 获取当前难度阶段的参数 ----
      const isAfter20S = frameCount >= DIFFICULTY_START;
      const currentMinGap = isAfter20S ? MIN_GAP_AFTER_20S() : MIN_GAP_BEFORE_20S();
      const currentMinInterval = isAfter20S ? MIN_INTERVAL_AFTER_20S() : MIN_INTERVAL_BEFORE_20S();
      const currentMinObsCount = isAfter20S ? MIN_OBS_COUNT_AFTER_20S() : MIN_OBS_COUNT_BEFORE_20S();
      
      if (frameCount < DIFFICULTY_START) {
        // 20秒前：保持较大间隙和间隔，但有波动
        const gapVariation = difficultyConfig.gapVariation; // 间隙波动幅度
        gapSize = Math.max(currentMinGap, INITIAL_GAP() + (Math.random() - 0.5) * gapVariation);
        
        // 横向间隔：忽大忽小，但保证画面内有最少障碍物数
        const intervalVariation = 60;
        let targetInterval = Math.max(currentMinInterval, INITIAL_INTERVAL() + (Math.random() - 0.5) * intervalVariation);
        
        // 确保画面内有足够的障碍物
        const currentObsCount = obstacles.length;
        if (currentObsCount < currentMinObsCount) {
          targetInterval = Math.min(targetInterval, 50); // 加速生成
        }
        spawnInterval = Math.floor(targetInterval);
      } else {
        // 20秒后：难度逐渐增加
        const elapsed = frameCount - DIFFICULTY_START;
        const difficulty = Math.min(1, elapsed / 5400); // 90秒内难度从0增加到1
        
        // 纵向间隙：缓慢变小，同时忽大忽小
        const baseGap = INITIAL_GAP() - (INITIAL_GAP() - currentMinGap) * difficulty;
        const gapVariation = difficultyConfig.gapVariation + (1 - difficulty) * 40; // 波动幅度随难度降低
        gapSize = Math.max(currentMinGap, baseGap + (Math.random() - 0.5) * gapVariation);
        
        // 横向间隔：缓慢变小，同时忽大忽小
        const baseInterval = INITIAL_INTERVAL() - (INITIAL_INTERVAL() - currentMinInterval) * difficulty;
        const intervalVariation = 50 + (1 - difficulty) * 30; // 波动幅度随难度降低
        let targetInterval = Math.max(currentMinInterval, baseInterval + (Math.random() - 0.5) * intervalVariation);
        
        // 确保画面内有足够的障碍物
        const currentObsCount = obstacles.length;
        if (currentObsCount < currentMinObsCount) {
          targetInterval = Math.min(targetInterval, 40); // 加速生成
        }
        spawnInterval = Math.floor(targetInterval);
      }
    }


    /**
     * updateClouds() — 更新云朵/星星/火把的位置和动画状态
     *
     * 所有元素以各自速度向左滚动（c.speed * gameSpeed），
     * 出左边界后从右侧重新生成并随机 Y 位置。
     * 额外动画更新：
     * - 星星（type=star）：twinkle 相位递增，在 drawSceneElements 中由 sin 控制 alpha
     * - 火把（type=torch）：flicker 递增 0.15，在 drawTorch 中产生摇曳偏移
     *
     * 参数：无（操作全局 clouds 数组）
     * 返回：无
     */
    function updateClouds() {
      for (const c of clouds) {
        c.x -= gameSpeed * c.speed;   // 每朵云有自己的滚动速度
        if (c.x + c.w < 0) {          // 移出左侧屏幕后，从右侧重新出现
          c.x = W + Math.random() * 100;
          c.y = 30 + Math.random() * 180;
        }
        // 更新星星闪烁（每帧更新，让星星有轻微的闪烁效果）
        if (c.type === 'star') {
          c.twinkle += c.twinkleSpeed;
        }
        // 更新火把摇曳
        if (c.type === 'torch') {
          c.flicker += 0.15;
        }
      }
    }


    /**
     * checkCollisions() — AABB（轴对齐包围盒）碰撞检测
     *
     * 碰撞盒比鸟实际尺寸每边收缩 2px（即宽高各减 4px），
     * 让碰撞判定更宽容，提升玩家体验。
     *
     * 检测流程：
     * 1. safeTimer > 0 时跳过检测（安全期保护）
     * 2. 遍历 obstacles，检查鸟的碰撞盒与障碍物水平方向是否重叠
     * 3. 若水平重叠，根据 obsType 检测垂直方向：
     *    - both：鸟顶 < o.topH 或 鸟底 > o.bottomTop
     *    - top：仅鸟顶 < o.topH
     *    - bottom：仅鸟底 > o.bottomTop
     * 4. 碰撞发生时调用 startDying()
     *
     * 参数：无（读取 bird, obstacles, safeTimer）
     * 返回：无
     */
    function checkCollisions() {
      if (safeTimer > 0) return;  // 安全期内不检测

      // 鸟的碰撞盒比实际显示小 4 像素（每边缩 2 像素），让碰撞更宽容
      const bx = bird.x + 2;
      const by = bird.y + 2;
      const bw = bird.w - 4;
      const bh = bird.h - 4;

      // 遍历所有障碍物，检查是否重叠
      for (const o of obstacles) {
        // 水平方向有重叠
        if (bx + bw > o.x && bx < o.x + OBS_W) {
          const obsType = o.obsType || 'both';
          
          // 根据obsType决定检测哪些障碍物
          let collision = false;
          
          if (obsType === 'both') {
            // 上下都有：检测上柱子和下柱子
            collision = by < o.topH || by + bh > o.bottomTop;
          } else if (obsType === 'top') {
            // 仅上有：只检测上柱子
            collision = by < o.topH;
          } else {
            // 仅下有：只检测下柱子
            collision = by + bh > o.bottomTop;
          }
          
          if (collision) {
            startDying();  // 进入死亡掉落动画
            return;
          }
        }
      }
    }


    /**
     * startDying() — 进入死亡掉落动画状态
     *
     * 仅在 gameState === playing 时生效（防止重复触发）。
     * 设置状态为 dying，给鸟 2px/帧的下落初速度，
     * 阻止悬停（hoverTimer = HOVER_FRAMES），播放碰撞音效，
     * 在鸟位置生成 15 个 crash 类型粒子。
     *
     * 参数：无
     * 返回：无
     */
    function startDying() {
      if (gameState === 'playing') {
        gameState = 'dying';
        bird.vy = 2;
        bird.hoverTimer = HOVER_FRAMES;
        playCrashSound();
        createParticles(bird.x + 14, bird.y + 12, 15, 'crash');
      }
    }


    /**
     * gameOver() — 直接结束游戏（撞地时调用，不经过掉落动画阶段）
     *
     * 仅在 gameState === playing 时生效。
     * 状态直接切换为 gameover 并播放碰撞音效。
     *
     * 参数：无
     * 返回：无
     */
    function gameOver() {
      if (gameState === 'playing') {
        gameState = 'gameover';
        playCrashSound();                 // 播放碰撞音效
      }
    }


    /**
     * updateFixed() — 固定时间步长（1/60 秒）的游戏逻辑更新
     *
     * 这是每 16.67ms 执行一次的核心更新函数：
     *
     * playing 状态：
     * - frameCount++（统一按 60fps 计算，与实际帧率解耦）
     * - safeTimer 递减（若 > 0）
     * - platformX 向左移动 gameSpeed
     * - 依次调用：updateBird() -> updateObstacles() -> updateSpeed()
     *   -> updateClouds() -> updateParticles() -> checkCollisions()
     * - tutorialTimer++
     * - 每 8 帧且鸟在上升时（vy < 0）生成 1 个 score 粒子
     *
     * dying 状态：
     * - rotation 每帧增加 0.08 弧度，最大值 Math.PI（180 度翻转）
     * - 受重力下落，速度上限 MAX_FALL
     * - 翅膀继续扇动
     * - 落地后切换为 gameover 状态
     *
     * 参数：无
     * 返回：无
     */
    function updateFixed() {
      // ---- 正常游戏中的更新 ----
      if (gameState === 'playing') {
        frameCount++;                         // 帧数 +1（统一按60fps计算）
        if (safeTimer > 0) safeTimer--;       // 安全期倒计时
        platformX -= gameSpeed;               // 起飞平台向左滚动
        updateBird();                         // 更新肥啾物理
        updateObstacles();                    // 更新障碍物
        updateSpeed();                        // 更新游戏速度
        updateClouds();                       // 更新云朵
        updateParticles();                    // 更新粒子
        checkCollisions();                    // 检测碰撞
        tutorialTimer++;                     // 教程计时
        
        // 每隔一定帧数生成飞行轨迹粒子
        if (frameCount % 8 === 0 && bird.vy < 0) {
          createParticles(bird.x + 14, bird.y + 12, 1, 'score');
        }
      }
      // ---- 死亡掉落中的更新 ----
      else if (gameState === 'dying') {
        bird.rotation = Math.min(Math.PI, bird.rotation + 0.08); // 每帧转 0.08 弧度，最多转 180°
        bird.vy += GRAVITY();           // 受重力下落
        bird.vy = Math.min(MAX_FALL, bird.vy);
        bird.y += bird.vy;

        // 翅膀继续扇动
        bird.wingTimer++;
        if (bird.wingTimer >= 8) {
          bird.wingTimer = 0;
          bird.wingFrame = 1 - bird.wingFrame;
        }

        // 落到地面 → 弹出结算画面
        if (bird.y + bird.h >= GROUND_Y) {
          bird.y = GROUND_Y - bird.h;
          gameState = 'gameover';
        }
      }
    }

    /* ================================================================
     *  七、主循环 — 每秒执行约 60 次，每次先更新逻辑再重新绘制
     * ================================================================ */


    /**
     * update() — 主更新入口（时间累积 + 固定时间步长执行）
     *
     * 使用 performance.now() 获取高精度时间计算 deltaTime。
     * 累积时间按固定步长（fixedStep = 1000/60）消耗，
     * 每次消耗调用一次 updateFixed()。
     *
     * 防卡顿保护：
     * - 若累积时间 > 500ms（如标签页切换回来后），重置为 fixedStep
     * - 每帧最多执行 maxUpdates=5 次 updateFixed，防止长时间卡顿后
     *   一次性追帧导致物理状态异常
     *
     * 此设计保证不同刷新率设备上游戏速度一致：
     * 60Hz 屏幕典型每帧执行 1 次，120Hz 屏幕每帧约 2 次但每次更新量减半。
     *
     * 参数：无
     * 返回：无
     */
    function update() {
      const currentTime = performance.now();
      const deltaTime = currentTime - lastTime;
      lastTime = currentTime;
      
      // 累积时间，使用固定时间步长更新物理
      accumulatedTime += deltaTime;
      const fixedStep = 1000 / 60; // 60fps 对应的毫秒数
      
      // 防止accumulatedTime过大导致卡顿（限制最大累积时间）
      if (accumulatedTime > 500) {
        accumulatedTime = fixedStep;
      }
      
      // 限制每帧最多执行的更新次数，防止卡顿
      let updates = 0;
      const maxUpdates = 5;
      while (accumulatedTime >= fixedStep && updates < maxUpdates) {
        updateFixed();
        accumulatedTime -= fixedStep;
        updates++;
      }
    }


    /**
     * draw() — 主绘制入口（根据 gameState 决定绘制内容）
     *
     * 绘制状态机：
     * - start：背景 + 平台 + 鸟 + 开始界面（遮罩 + 文字 + 按钮 + 选项）
     * - 其他（playing/dying/gameover）：背景 + 障碍物 + 粒子 + 鸟 +
     *   悬停指示器(非dying时) + 平台(若仍在屏幕内) + HUD +
     *   结算界面(仅gameover时)
     *
     * 参数：无
     * 返回：无
     */
    function draw() {
      // 清空画布
      ctx.clearRect(0, 0, W, H);
      
      drawBackground();              // 先画背景（天空、云、地面）

      if (gameState === 'start') {
        // 开始界面：画平台、鸟、半透明遮罩 + 文字
        drawPlatform();
        drawBird();
        drawStartScreen();
      } else {
        // 游戏中/死亡/结算：画障碍物、鸟、平台（如果还在屏幕内）、HUD
        drawObstacles();
        drawParticles();             // 绘制粒子效果
        drawBird();
        if (gameState !== 'dying') {
          drawHoverIndicator();      // 悬停提示（死亡掉落时不显示）
        }
        if (platformX + PLATFORM_W > 0) {
          drawPlatform();            // 平台还在屏幕内就画
        }
        drawHUD();
        if (gameState === 'gameover') {
          drawGameOverScreen();      // 结算画面
        }
      }
    }


    /**
     * startGame() — 从开始界面启动游戏
     *
     * 执行顺序：
     * 1. initAudio() — 初次启动时创建 AudioContext
     * 2. 将鸟定位在平台正中央，给予上升初速度 LIFT()
     * 3. 清空障碍物和粒子
     * 4. 设置安全期：取 max(SAFE_FRAMES(), 60)，确保充足起飞时间
     * 5. 切换 gameState 为 playing
     * 6. 播放跳跃音效 + 生成 8 个 jump 粒子
     * 7. startBGM() — 启动背景音乐
     *
     * 参数：无
     * 返回：无
     */
    function startGame() {
      initAudio();
      // 确保鸟站在平台正中央再起飞
      bird.y = GROUND_Y - PLATFORM_H - 24;
      bird.vy = LIFT();
      bird.rotation = 0;
      bird.hoverTimer = 0;
      // 无障碍物、粒子干扰
      obstacles = [];
      particles = [];
      // 安全期：至少60帧（1秒），确保即使快速点击也有充足起飞时间
      safeTimer = Math.max(SAFE_FRAMES(), 60);
      gameState = 'playing';
      spaceHeld = false;
      playJumpSound();
      createParticles(BIRD_X + 14, bird.y + 12, 8, 'jump');
      startBGM();
    }

    /**
     * loop() — 游戏主循环，浏览器每秒调用约 60 次
     * 先 update（更新逻辑）→ 再 draw（重新绘制）
     */
    let animationId = null;
    

    /**
     * loop() — 游戏主循环（requestAnimationFrame 驱动）
     *
     * 每帧执行顺序：update() -> draw()
     * update 负责所有物理/逻辑更新（固定时间步长），
     * draw 负责所有帧绘制操作。
     * requestAnimationFrame 自动与浏览器刷新率同步。
     *
     * 参数：无
     * 返回：无
     */
    function loop() {
      update();
      draw();
      animationId = requestAnimationFrame(loop);
    }
    

    /**
     * restartGame() — 重新开始游戏
     *
     * 播放点击音效 -> reset()（重置全部数据）-> startGame()（立即开始）
     *
     * 参数：无
     * 返回：无
     */
    function restartGame() {
      playClickSound();
      reset();
      startGame();
    }
    

    /**
     * returnToStartScreen() — 返回开始界面
     *
     * 播放点击音效 -> reset()（重置数据）-> 设置 gameState = start
     * 同时清除重新开始和返回按钮的悬停状态。
     *
     * 参数：无
     * 返回：无
     */
    function returnToStartScreen() {
      playClickSound();
      reset();
      gameState = 'start';
      isHoveringRestartBtn = false;
      isHoveringReturnBtn = false;
    }
    

    /**
     * stopLoop() — 停止游戏主循环
     *
     * 调用 cancelAnimationFrame(animationId) 取消下一帧回调，
     * 清空 animationId 引用。
     *
     * 参数：无
     * 返回：无
     */
    function stopLoop() {
      if (animationId) {
        cancelAnimationFrame(animationId);
        animationId = null;
      }
    }

    /* ================================================================
     *  八、事件监听 — 支持鼠标/触屏/键盘三端统一操作
     * ================================================================ */

    // ---- 统一的坐标转换工具 ----

    /**
     * getCanvasPos() — 将浏览器客户端坐标转换为画布逻辑坐标
     *
     * CSS 尺寸与逻辑尺寸可能不同，按比例映射：
     * canvasX = (clientX - rect.left) * (W / rect.width)
     *
     * @param {number} clientX — 浏览器窗口客户端 X
     * @param {number} clientY — 浏览器窗口客户端 Y
     * @returns {{x: number, y: number}} 画布逻辑坐标
     */
    function getCanvasPos(clientX, clientY) {
      const rect = canvas.getBoundingClientRect();
      return {
        x: (clientX - rect.left) * (W / rect.width),
        y: (clientY - rect.top) * (H / rect.height)
      };
    }

    // ---- 统一的UI点击处理（开始页/结束页按钮、选项、静音）----

    /**
     * handleUIClick() — 统一的 UI 点击事件处理入口
     *
     * 根据 gameState 执行不同分支：
     * - start：检测顺序：开始按钮 -> 场景单选 -> 难度单选 -> 皮肤单选
     * - gameover：检测顺序：再来一局按钮 -> 返回开始页面按钮
     * - 所有状态：检测右下角静音按钮区域 (W-130 ~ W, H-25 ~ H)
     *
     * 所有坐标与绘制函数（drawStartScreen/drawGameOverScreen）共用
     * START_LAYOUT 常量或相同计算逻辑，保证点击区域精确对齐。
     *
     * @param {number} cx — 画布逻辑 X
     * @param {number} cy — 画布逻辑 Y
     * @returns {boolean} 是否命中某个 UI 交互元素
     */
    function handleUIClick(cx, cy) {
      const L = START_LAYOUT;

      if (gameState === 'start') {
        // 开始游戏按钮
        const btnX = W / 2 - L.btnW / 2;
        if (cx >= btnX && cx <= btnX + L.btnW &&
            cy >= L.btnY && cy <= L.btnY + L.btnH) {
          playClickSound();
          startGame();
          return true;
        }

        // 场景选择
        const sceneKeys = [SCENES.DESERT, SCENES.NIGHT, SCENES.DUNGEON];
        for (let i = 0; i < 3; i++) {
          const rx = L.sceneX + (i - 1) * L.sceneSpacing;
          const ry = L.sceneBtnY;
          const dist = Math.sqrt((cx - rx) ** 2 + (cy - ry) ** 2);
          if (dist <= RADIO_BTN.touchRadius) {
            setSceneMode(sceneKeys[i]);
            return true;
          }
        }

        // 难度选择
        const diffKeys = [DIFFICULTY_LEVELS.LOW, DIFFICULTY_LEVELS.MEDIUM, DIFFICULTY_LEVELS.HIGH];
        for (let i = 0; i < 3; i++) {
          const rx = L.diffX + (i - 1) * L.diffSpacing;
          const ry = L.diffBtnY;
          const dist = Math.sqrt((cx - rx) ** 2 + (cy - ry) ** 2);
          if (dist <= RADIO_BTN.touchRadius) {
            setDifficulty(diffKeys[i]);
            return true;
          }
        }

        // 皮肤选择
        const skinKeys = [SKINS.ORIGINAL, SKINS.YELLOW_CUTE, SKINS.BLUE_BIRD, SKINS.PINK_PARROT, SKINS.GREEN_FINCH];
        for (let i = 0; i < 5; i++) {
          const rx = W / 2 + (i - 2) * L.skinSpacing;
          const ry = L.skinBtnY;
          const dist = Math.sqrt((cx - rx) ** 2 + (cy - ry) ** 2);
          if (dist <= RADIO_BTN.touchRadius) {
            setSkin(skinKeys[i]);
            return true;
          }
        }
      } else if (gameState === 'gameover') {
        const btnW = 180;
        const btnH = 50;
        const restartBtnY = H / 2 + 50;
        const restartBtnX = W / 2 - btnW / 2;
        const returnBtnY = restartBtnY + btnH + 20;
        const returnBtnX = W / 2 - btnW / 2;

        if (cx >= restartBtnX && cx <= restartBtnX + btnW &&
            cy >= restartBtnY && cy <= restartBtnY + btnH) {
          playClickSound();
          restartGame();
          return true;
        }

        if (cx >= returnBtnX && cx <= returnBtnX + btnW &&
            cy >= returnBtnY && cy <= returnBtnY + btnH) {
          playClickSound();
          returnToStartScreen();
          return true;
        }
      }

      // 静音按钮（游戏中、开始页、结束页均可点击）
      // 静音按钮区域：右下角 (W-130, H-25) 到 (W, H)
      if (cx >= W - 130 && cx <= W && cy >= H - 25 && cy <= H) {
        toggleMute();
        return true;
      }

      return false;
    }

    // ---- 触屏操作：统一处理所有状态 ----
    let touchHandledByUI = false; // 标记本次touch是否已被UI消费

    canvas.addEventListener('touchstart', (e) => {
      e.preventDefault();
      const touch = e.touches[0];
      const pos = getCanvasPos(touch.clientX, touch.clientY);

      // 优先处理UI点击（开始页/结束页的按钮、选项、静音）
      if (handleUIClick(pos.x, pos.y)) {
        touchHandledByUI = true;
        return;
      }
      touchHandledByUI = false;

      // 游戏进行中：触摸=按住空格（持续上升）
      if (gameState === 'playing') {
        if (!spaceHeld) {
          bird.vy = LIFT();
          bird.hoverTimer = 0;
          playJumpSound();
        }
        spaceHeld = true;
      }
    }, { passive: false });

    canvas.addEventListener('touchmove', (e) => {
      e.preventDefault(); // 防止页面滚动
    }, { passive: false });

    canvas.addEventListener('touchend', (e) => {
      e.preventDefault();
      if (!touchHandledByUI && gameState === 'playing') {
        spaceHeld = false;
      }
      touchHandledByUI = false;
    }, { passive: false });

    // ---- 鼠标点击（桌面端）----
    canvas.addEventListener('click', (e) => {
      const pos = getCanvasPos(e.clientX, e.clientY);

      // 先尝试处理UI点击
      if (handleUIClick(pos.x, pos.y)) {
        return;
      }

      // 游戏中点击画布=跳跃（桌面端方便操作）
      if (gameState === 'playing') {
        if (!spaceHeld) {
          bird.vy = LIFT();
          bird.hoverTimer = 0;
          playJumpSound();
        }
        spaceHeld = true;
      }
    });

    // 鼠标松开时停止持续上升（配合click的spaceHeld=true）
    canvas.addEventListener('mouseup', () => {
      if (gameState === 'playing') {
        spaceHeld = false;
      }
    });

    // ---- 鼠标移动：检测悬停状态（仅桌面端有效）----
    canvas.addEventListener('mousemove', (e) => {
      const pos = getCanvasPos(e.clientX, e.clientY);
      mouseX = pos.x;
      mouseY = pos.y;

      if (gameState === 'start') {
        const L = START_LAYOUT;
        const btnX = W / 2 - L.btnW / 2;
        isHoveringStartBtn = mouseX >= btnX && mouseX <= btnX + L.btnW &&
                            mouseY >= L.btnY && mouseY <= L.btnY + L.btnH;
        canvas.style.cursor = isHoveringStartBtn ? 'pointer' : 'default';
      } else if (gameState === 'gameover') {
        const btnW = 180;
        const btnH = 50;
        const restartBtnY = H / 2 + 50;
        const restartBtnX = W / 2 - btnW / 2;
        const returnBtnY = restartBtnY + btnH + 20;
        const returnBtnX = W / 2 - btnW / 2;

        isHoveringRestartBtn = mouseX >= restartBtnX && mouseX <= restartBtnX + btnW &&
                               mouseY >= restartBtnY && mouseY <= restartBtnY + btnH;
        isHoveringReturnBtn = mouseX >= returnBtnX && mouseX <= returnBtnX + btnW &&
                              mouseY >= returnBtnY && mouseY <= returnBtnY + btnH;
        canvas.style.cursor = (isHoveringRestartBtn || isHoveringReturnBtn) ? 'pointer' : 'default';
      } else if (gameState === 'playing') {
        // 游戏中鼠标移动时也检测静音按钮悬停
        const isHoveringMute = mouseX >= W - 130 && mouseX <= W && mouseY >= H - 25 && mouseY <= H;
        canvas.style.cursor = isHoveringMute ? 'pointer' : 'default';
      }
    });

    canvas.addEventListener('mouseleave', () => {
      isHoveringStartBtn = false;
      isHoveringRestartBtn = false;
      isHoveringReturnBtn = false;
      canvas.style.cursor = 'default';
    });

    // ---- 按下空格：给肥啾一个上升速度 ----
    document.addEventListener('keydown', (e) => {
      if (e.code === 'Space') {
        e.preventDefault();
        if (gameState === 'playing') {
          if (!spaceHeld) {
            bird.vy = LIFT();
            bird.hoverTimer = 0;
            playJumpSound();
          }
          spaceHeld = true;
        }
      }
      else if (e.code === 'KeyM') {
        e.preventDefault();
        toggleMute();
      }
    });

    document.addEventListener('keyup', (e) => {
      if (e.code === 'Space') {
        e.preventDefault();
        spaceHeld = false;
      }
    });

    /* ================================================================
     *  九、启动游戏 — 先重置数据，再启动主循环
     * ================================================================ */
    reset();
    loop();
  </script>
</body>
</html>
